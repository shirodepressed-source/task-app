<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Task System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0a0f1f, #02040a);
    color: #00f7ff;
}

.container { padding: 20px; }

h1 {
    text-align: center;
    text-shadow: 0 0 10px #00f7ff;
}

input, textarea, select {
    background: #02040a;
    border: 1px solid #00f7ff;
    color: #00f7ff;
    padding: 10px;
    border-radius: 8px;
    width: 100%;
    margin-bottom: 10px;
}

button {
    background: transparent;
    border: 1px solid #00f7ff;
    color: #00f7ff;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover { background: #00f7ff; color: black; }

.task {
    border: 1px solid #00f7ff33;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.hidden { display: none; }

.star { cursor: pointer; font-size: 20px; }

</style>
</head>

<body>

<div class="container" id="auth">
    <h1>Přihlášení</h1>
    <input id="nickname" placeholder="Přezdívka">
    <select id="role">
        <option value="giver">Zadavatel práce</option>
        <option value="worker">Pracovník</option>
    </select>
    <button onclick="login()">Pokračovat</button>
</div>

<div class="container hidden" id="app">
    <h1 id="welcome"></h1>

    <div id="giverUI" class="hidden">
        <h2>Přidat práci</h2>
        <input id="taskName" placeholder="Název práce">
        <textarea id="taskDesc" placeholder="Popis"></textarea>
        <input id="taskPrice" placeholder="Odměna">
        <textarea id="taskSecret" placeholder="Tajné info"></textarea>
        <button onclick="addTask()">Přidat</button>
    </div>

    <div id="workerUI" class="hidden">
        <h2>Dostupné práce</h2>
    </div>

    <div id="taskList"></div>
</div>

<script>

// === JEDNODUCHÁ FUNKČNÍ VERZE (bez Firebase - funguje hned) ===

let currentUser = null;

function login() {
    const name = document.getElementById("nickname").value;
    const role = document.getElementById("role").value;
    if (!name) return;

    currentUser = { name, role };

    document.getElementById("auth").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("welcome").innerText = "Uživatel: " + name;

    if (role === "giver") {
        document.getElementById("giverUI").classList.remove("hidden");
    } else {
        document.getElementById("workerUI").classList.remove("hidden");
    }

    loadTasks();
}

function getTasks() {
    return JSON.parse(localStorage.getItem("tasks") || "[]");
}

function saveTasks(tasks) {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    const tasks = getTasks();

    tasks.push({
        name: document.getElementById("taskName").value,
        desc: document.getElementById("taskDesc").value,
        price: document.getElementById("taskPrice").value,
        secret: document.getElementById("taskSecret").value,
        takenBy: null,
        rating: 0
    });

    saveTasks(tasks);
    loadTasks();
}

function loadTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    const tasks = getTasks();

    tasks.forEach((t, index) => {
        const div = document.createElement("div");
        div.className = "task";

        if (currentUser.role === "giver") {
            div.innerHTML = `
                <strong>${t.name}</strong><br>
                Odměna: ${t.price}<br>
                Přijal: ${t.takenBy || "nikdo"}<br>
                ${t.takenBy ? renderStars(index) : ""}
            `;
        } else {
            if (t.takenBy && t.takenBy !== currentUser.name) return;

            div.innerHTML = `
                <strong>${t.name}</strong><br>
                Odměna: ${t.price}<br>
                ${t.takenBy === currentUser.name ? `
                    <p>${t.desc}</p>
                    <p>Tajné info: ${t.secret}</p>
                ` : `
                    <button onclick="takeTask(${index})">Přijmout</button>
                `}
            `;
        }

        list.appendChild(div);
    });
}

function takeTask(index) {
    const tasks = getTasks();
    tasks[index].takenBy = currentUser.name;
    saveTasks(tasks);
    loadTasks();
}

function renderStars(index) {
    const tasks = getTasks();
    const rating = tasks[index].rating || 0;

    let stars = "";

    for (let i = 1; i <= 5; i++) {
        const symbol = i <= rating ? "⭐" : "☆";
        stars += `<span class="star" onclick="rateTask(${index}, ${i})">${symbol}</span>`;
    }

    stars += ` (${rating}/5)`;

    return stars;
}

function rateTask(index, value) {
    const tasks = getTasks();
    tasks[index].rating = value;
    saveTasks(tasks);
    loadTasks();
}

</script>

</body>
</html>
